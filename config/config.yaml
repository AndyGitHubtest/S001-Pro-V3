# S001-Pro V3 Configuration
version: "3.0.0"

# === Exchange (Binance) ===
exchange:
  name: "binance"
  sandbox: false              # 实盘模式
  api_key: ""                 # 从环境变量 BINANCE_API_KEY 读取
  api_secret: ""              # 从环境变量 BINANCE_API_SECRET 读取
  
# === Data Source (Data-Core API) ===
data_core:
  api_url: "http://localhost:8080/api"
  timeout: 30
  retry: 3

# === Database ===
database:
  # 共享K线数据库 (Data-Core提供，策略只读)
  klines_db: "/home/ubuntu/projects/data-core/data/klines.db"
  
  # 策略私有状态数据库 (每个策略独立)
  state_db: "data/strategy.db"
  
  # 缓存配置
  cache_size: 500

# === Trading Parameters (1000 USDT 小资金配置) ===
trading:
  # 主池 (15m) - 70%资金
  primary:
    timeframe: "15m"
    top_n: 30
    capital_ratio: 0.7          # 700 USDT
    capital_per_position: 100   # 每对100 USDT (5x杠杆 = 500 USDT名义)
    leverage: 5                 # 保守杠杆
    z_entry_default: 2.5
    z_exit_default: 0.5
    z_stop_offset_default: 2.0
  
  # 次池 (5m) - 30%资金
  secondary:
    timeframe: "5m"
    top_n: 10
    capital_ratio: 0.3          # 300 USDT
    capital_per_position: 100
    leverage: 5
    max_per_day: 2              # 减少交易频率
    z_entry_default: 2.0
    z_exit_default: 0.4
    z_stop_offset_default: 1.5
  
  # 过滤器 (30m)
  filter:
    timeframe: "30m"
    threshold: 1.0  # |Z_30m| < 1.0
  
  # 通用 - 小资金严格限制
  max_positions: 3              # 最多3对，控制总风险
  max_concurrent_per_pool: 2    # 每池最多2对
  min_per_pair: 30              # 降低最小下单量
  max_per_pair_ratio: 0.10      # 每对最多10%总资金 (100 USDT)
  max_daily_loss_ratio: 0.05    # 日亏损上限5% (50 USDT)
  loop_interval: 10             # 10秒循环 (降低API调用)

# === Layer 1: Statistical Foundation ===
layer1:
  corr_median_min: 0.60     # 放宽: 0.65 -> 0.60
  coint_p_max: 0.2          # 放宽: 0.1 -> 0.2
  adf_p_max: 0.15           # 放宽: 0.1 -> 0.15

# === Layer 2: Mean Reversion Stability ===
layer2:
  half_life_max: 48
  corr_std_max: 0.12
  hurst_max: 0.6

# === Layer 3: Tradeability ===
layer3:
  zscore_max_min: 2.2
  spread_std_min: 0.001
  volume_min: 3000000  # USDT
  bid_ask_max: 0.0002  # 0.02%

# === Scoring Weights ===
scoring:
  w_coint: 0.30
  w_corr: 0.20
  w_halflife: 0.15
  w_zmax: 0.15
  w_stability: 0.10
  w_volume: 0.10

# === Pair Exclusion ===
exclusion:
  mode: "soft"
  max_per_symbol: 3

# === Parameter Optimization ===
optimization:
  coarse:
    z_entry: {min: 2.0, max: 6.0, step: 0.5}
    z_exit: {min: 0.25, max: 2.0, step: 0.5}
    stop_offset: {min: 1.0, max: 3.0, step: 1.0}
  fine:
    range: 0.5
    step: 0.25
  early_exit:
    min_pf_to_refine: 1.5
    max_backtests: 200

# === Output Filters ===
output:
  min_pf: 1.3
  min_profit: 0

# === Risk Control (1000 USDT 硬限制) ===
risk:
  # 资金硬限制
  max_total_margin: 300        # 最大保证金 300 USDT
  max_single_position: 100     # 单对最大 100 USDT
  max_leverage: 5              # 最大杠杆 5x
  
  # 损失限制
  max_daily_loss_usdt: 50      # 日亏损上限 50 USDT
  max_position_loss_ratio: 0.02 # 单对亏损2%强制平仓
  
  # 熔断机制
  circuit_breaker:
    enabled: true
    consecutive_losses: 3      # 连续3单亏损熔断
    cooldown_minutes: 60       # 冷却60分钟

# === Web Monitor ===
web:
  host: "0.0.0.0"
  port: 8000
  refresh: 5

# === Notification ===
notification:
  telegram:
    enabled: true
    bot_token: ""  # From env: TELEGRAM_BOT_TOKEN
    chat_id: ""    # From env: TELEGRAM_CHAT_ID
  events:
    - position_opened
    - position_closed
    - error
    - recovery_needed

# === Logging ===
logging:
  level: "INFO"
  file: "data/strategy.log"
  max_size: "10MB"
  backup_count: 5
